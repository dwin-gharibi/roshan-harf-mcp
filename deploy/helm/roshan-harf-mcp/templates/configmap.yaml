apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "roshan-harf-mcp.fullname" . }}
  labels:
    {{- include "roshan-harf-mcp.labels" . | nindent 4 }}
data:
  ROSHAN_HARF__DEFAULT_INSTANCE: {{ .Values.defaultInstance | quote }}
  ROSHAN_HARF__LOG_LEVEL: {{ .Values.logLevel | quote }}
  {{- range $name, $inst := .Values.instances }}
  {{- if $inst.base_url }}
  ROSHAN_HARF__INSTANCES__{{ $name | upper }}__BASE_URL: {{ $inst.base_url | quote }}
  {{- end }}
  {{- if hasKey $inst "verify_ssl" }}
  ROSHAN_HARF__INSTANCES__{{ $name | upper }}__VERIFY_SSL: {{ $inst.verify_ssl | quote }}
  {{- end }}
  {{- end }}
