{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "roshan-harf-mcp.fullname" . }}
  labels:
    {{- include "roshan-harf-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $name, $inst := .Values.instances }}
  {{- if $inst.token }}
  ROSHAN_HARF__INSTANCES__{{ $name | upper }}__TOKEN: {{ $inst.token | quote }}
  {{- end }}
  {{- if $inst.username }}
  ROSHAN_HARF__INSTANCES__{{ $name | upper }}__USERNAME: {{ $inst.username | quote }}
  {{- end }}
  {{- if $inst.password }}
  ROSHAN_HARF__INSTANCES__{{ $name | upper }}__PASSWORD: {{ $inst.password | quote }}
  {{- end }}
  {{- end }}
{{- end }}
