apiVersion: apps/v1
kind: Deployment
metadata:
  name: roshan-harf-mcp
  namespace: roshan-harf-mcp
  labels:
    app.kubernetes.io/name: roshan-harf-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: roshan-harf-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roshan-harf-mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: roshan-harf-mcp
          image: roshan-harf-mcp:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - "--transport"
            - "streamable-http"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: roshan-harf-mcp
            - secretRef:
                name: roshan-harf-mcp
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
