apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: roshan-harf-mcp
  namespace: roshan-harf-mcp
  labels:
    app.kubernetes.io/name: roshan-harf-mcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: roshan-harf-mcp
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
